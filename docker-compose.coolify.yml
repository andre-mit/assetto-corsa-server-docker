networks:
  coolify:
    external: true

volumes:
  ac-shared-config: # Config .ini/.yml — persisted, editable via ac-manager
  ac-shared-content: # Game content (cars, tracks)
  ac-postgres-data:
    # PostgreSQL data (only when profile 'postgres' is active)

services:

  # Optional managed PostgreSQL — activate with COMPOSE_PROFILES=postgres
  # Leave unset to use an external PostgreSQL (set DATABASE_URL directly)
  postgres:
    profiles:
      - postgres
    image: postgres:16-alpine
    container_name: ac-postgres
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-ac_manager}
    ports:
      - "5432:5432"
    volumes:
      - ac-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - coolify

  ac-server:
    build:
      context: .
      dockerfile: ac-server/Dockerfile
      network: host
    container_name: ac-server-instance
    environment:
      - STEAM_USER=${STEAM_USER}
      - STEAM_PASSWORD=${STEAM_PASSWORD}
    ports:
      - "9600:9600/tcp"
      - "9600:9600/udp"
      - "8081:8081/tcp"
      - "20081:20081/udp"
    volumes:
      - ac-shared-config:/home/steam/ac-server/cfg
      - ac-shared-content:/home/steam/ac-server/content
    restart: unless-stopped
    labels:
      - "app.assetto-corsa.service=ac-server"
      - "coolify.name=ac-server"
      - "coolify.icon=https://cdn2.steamgriddb.com/icon_thumb/97208e4cb6de9c04b325c2185316439f.png"
      - "coolify.type=application"

  ac-manager-next:
    build:
      context: ./ac-manager
      network: host
    container_name: ac-web-manager
    working_dir: /app
    expose:
      - 3000
    volumes:
      - ac-shared-config:/app/cfg
      - ac-shared-content:/app/game-content
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HOSTNAME=${WEB_HOSTNAME}
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - MASTER_EMAIL=${MASTER_EMAIL}
      - MASTER_PASSWORD=${MASTER_PASSWORD}
      - MASTER_NAME=${MASTER_NAME}
      - CONFIG_DIR=/app/cfg
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL}
    restart: unless-stopped
    depends_on:
      ac-server:
        condition: service_started
    networks:
      - default
      - coolify
